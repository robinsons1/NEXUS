<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
    <h1>⬡ NEXUS</h1>
    <p>Monitor de sensores en tiempo real</p>
</header>

<div class="status-bar">
    <span>📡 Último dato: <strong id="sb-ultimo">--</strong> (<span id="sb-hace">--</span>)</span>
    <span>📊 Desde: <strong id="sb-desde">--</strong></span>
    <span>🔄 Actualizado: <strong id="sb-pagina">--</strong></span>
    <span>⏱️ Próxima actualización: <span class="countdown" id="sb-countdown">5:00</span></span>
</div>

<div class="cards">
    <div class="card">
        <div class="label">Temperatura</div>
        <div class="value temp" id="val-temp">--</div>
        <div class="unit">°C</div>
    </div>
    <div class="card">
        <div class="label">Humedad</div>
        <div class="value hum" id="val-hum">--</div>
        <div class="unit">%</div>
    </div>
    <div class="card">
        <div class="label">Presión</div>
        <div class="value pres" id="val-pres">--</div>
        <div class="unit">hPa</div>
    </div>
</div>

<div class="filtro">
    <label>Desde</label>
    <input type="date" id="fecha-inicio">
    <label>Hasta</label>
    <input type="date" id="fecha-fin">
    <button onclick="aplicarFiltro()">Filtrar</button>
    <button onclick="resetFiltro()">Últimas lecturas</button>
</div>

<div class="charts">
    <div class="chart-box">
        <h3>🌡️ Temperatura (°C)</h3>
        <div id="chart-temp"></div>
    </div>
    <div class="charts-bottom">
        <div class="chart-box">
            <h3>💧 Humedad (%)</h3>
            <div id="chart-hum"></div>
        </div>
        <div class="chart-box">
            <h3>🔵 Presión (hPa)</h3>
            <div id="chart-pres"></div>
        </div>
    </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
