services:
  - type: web
    name: nexus-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FIREBASE_CREDENTIALS
        sync: false
      - key: THINGSPEAK_API_KEY
        sync: false
